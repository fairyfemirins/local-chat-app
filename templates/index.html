<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Chat App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.0/dist/socket.io.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        #chat-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        #messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
        }
        #message-input {
            width: 80%;
            display: inline-block;
        }
        #send-button {
            width: 18%;
        }
    </style>
</head>
<body>
    <div id="chat-container" class="container">
        <h1 class="text-center mb-4">Local Chat</h1>
        <p class="text-center">Chat with people near you (within 1km).</p>
        
        <div id="messages"></div>
        
        <div class="input-group mb-3">
            <input type="text" id="message-input" class="form-control" placeholder="Type your message...">
            <button id="send-button" class="btn btn-primary">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        let userId = null;

        // Assign user ID
        socket.on('assign_user_id', (data) => {
            userId = data.user_id;
            console.log('Assigned user ID:', userId);
        });

        // Request location permission
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;
                socket.emit('update_location', { user_id: userId, latitude, longitude });
            });
        }

        // Send message
        document.getElementById('send-button').addEventListener('click', () => {
            const message = document.getElementById('message-input').value;
            if (message.trim() !== '') {
                socket.emit('send_message', { user_id: userId, message });
                document.getElementById('message-input').value = '';
            }
        });

        // Receive message
        socket.on('receive_message', (data) => {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.innerHTML = `<strong>User ${data.user_id.substring(0, 8)}:</strong> ${data.message}`;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>
</body>
</html>
